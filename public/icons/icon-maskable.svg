<!--
  Maskable icon — Android adaptive icon.
  Safe zone is the inner 60% of the canvas (102-410 px on 512).
  All content is kept inside that boundary.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full-bleed black background (required for maskable) -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- F (scaled/shifted to fit safe zone) -->
  <g fill="white">
    <polygon points="132,128  163,128  157,286  126,286"/>
    <polygon points="132,128  228,128  225,156  129,156"/>
    <polygon points="132,188  202,188  199,214  129,214"/>
    <!-- slash cut -->
    <polygon points="163,165  178,165  152,224  137,224" fill="black"/>
  </g>

  <!-- N -->
  <g fill="white">
    <polygon points="262,128  293,128  287,286  256,286"/>
    <polygon points="372,128  403,128  397,286  366,286"/>
    <polygon points="262,128  303,128  403,286  362,286"/>
    <!-- slash cut -->
    <polygon points="316,128  336,128  318,184  298,184" fill="black"/>
  </g>

  <!-- Rule -->
  <rect x="102" y="308" width="308" height="2" fill="white" opacity="0.9"/>

  <!-- Wordmark -->
  <text
    x="256" y="348"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="40"
    font-weight="900"
    fill="white"
    letter-spacing="4"
  >FRAG NAIJA</text>

  <!-- Chevron -->
  <rect x="102" y="365" width="112" height="2" fill="white" opacity="0.85"/>
  <rect x="298" y="365" width="112" height="2" fill="white" opacity="0.85"/>
  <polygon points="200,365  256,398  312,365  304,365  256,390  208,365" fill="white"/>
  <polygon points="249,396  263,396  256,410" fill="white"/>
</svg>
