<!-- Maskable icon — content within inner 60% safe zone (102–410 px on 512 canvas) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="gf">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full-bleed background (required for maskable) -->
  <rect width="512" height="512" fill="#040904"/>
  <!-- Subtle radial centre highlight -->
  <radialGradient id="mg" cx="50%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#0d2010"/>
    <stop offset="100%" stop-color="#040904"/>
  </radialGradient>
  <rect width="512" height="512" fill="url(#mg)"/>

  <!-- FN inside safe zone -->
  <text
    x="256" y="308"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="220"
    font-weight="900"
    fill="#00ff41"
    filter="url(#gf)"
  >FN</text>

  <rect x="178" y="335" width="156" height="5" rx="2.5" fill="#00ff41" opacity="0.5"/>
</svg>
