<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0d2010"/>
      <stop offset="100%" stop-color="#040904"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0L0 0 0 32" fill="none" stroke="rgba(0,255,65,0.07)" stroke-width="0.8"/>
    </pattern>
    <filter id="gf" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Outer border -->
  <rect x="16" y="16" width="480" height="480" fill="none" stroke="rgba(0,255,65,0.14)" stroke-width="1.5"/>

  <!-- Corner brackets -->
  <path d="M36 72 L36 36 L72 36"  stroke="#00ff41" stroke-opacity="0.35" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M440 36 L476 36 L476 72" stroke="#00ff41" stroke-opacity="0.35" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M36 440 L36 476 L72 476" stroke="#00ff41" stroke-opacity="0.35" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M476 440 L476 476 L440 476" stroke="#00ff41" stroke-opacity="0.35" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- FN monogram with glow -->
  <text
    x="256" y="318"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="252"
    font-weight="900"
    fill="#00ff41"
    filter="url(#gf)"
  >FN</text>

  <!-- Accent bars -->
  <rect x="168" y="346" width="176" height="5" rx="2.5" fill="#00ff41" opacity="0.55"/>
  <rect x="208" y="360" width="96"  height="2.5" rx="1.25" fill="#00ff41" opacity="0.28"/>

  <!-- Tiny tagline -->
  <text
    x="256" y="434"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="22"
    fill="#00ff41"
    opacity="0.4"
    letter-spacing="6"
  >FRAG NAIJA</text>
</svg>
